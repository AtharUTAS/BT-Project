services: 
  client:
    build:
      context: ./client 
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      REACT_APP_SERVER_URL: http://localhost:3001 
    depends_on:
      - server 
    networks: 
      - app-network 
  server: 
    build:
      context: ./server 
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    networks:
      - app-network
    environment: 
      PORT: 3001 
      DB_USERNAME: admin 
      DB_PASSWORD: csse4103 
      BD_NAME: postitdb
networks :
      app-network:
          driver: bridge